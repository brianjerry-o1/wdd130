<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Brian Jeremiah Wanga">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="Logo for Basic Layout" width="128" height="128">
    </header>

    <nav>
        <ul>
            <li><a href="https://byui.edu" target="_blank">BYU-Idaho</a></li>
            <li><a href="https://churchofjesuschrist.org" target="_blank">The Church</a></li>
        </ul>
    </nav>

    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading 1</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Maxime, provident.</p>
        </section>
        <section>
            <h2>Heading 2</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, voluptatibus.</p>
        </section>
    </main>

    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/payson-utah/800x500/payson-utah-temple-celestial-room-1458545.jpg"
          alt="Payson Utah Temple Celestial Room" width="200">
    </aside>

    <footer>
        <p>Brian Jeremiah Wanga</p>
    </footer>
</body>

</html>
